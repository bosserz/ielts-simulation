{% extends "base.html" %}
{% block title %}Log In — IELTS Simulation{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <h1 class="text-2xl font-semibold mb-6 text-center">Log in to your account</h1>
  <form method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" name="email" required
             class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-ielts-blue">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password</label>
      <input type="password" name="password" required
             class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-ielts-blue">
    </div>
    <label class="flex items-center gap-2 text-sm">
      <input type="checkbox" name="remember"> Remember me
    </label>
    <button type="submit"
            class="w-full bg-ielts-blue text-white py-2 rounded font-medium hover:bg-blue-900 transition">
      Log in
    </button>
  </form>
  <p class="mt-4 text-center text-sm">
    No account? <a href="{{ url_for('auth.register') }}" class="text-ielts-blue hover:underline">Register</a>
  </p>
</div>
{% endblock %}
