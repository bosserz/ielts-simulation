{% extends "base.html" %}
{% block title %}Register — IELTS Simulation{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <h1 class="text-2xl font-semibold mb-6 text-center">Create your account</h1>
  <form method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="block text-sm font-medium mb-1">Full name</label>
      <input type="text" name="name" required
             class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-ielts-blue">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" name="email" required
             class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-ielts-blue">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password</label>
      <input type="password" name="password" required minlength="8"
             class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-ielts-blue">
    </div>
    <button type="submit"
            class="w-full bg-ielts-blue text-white py-2 rounded font-medium hover:bg-blue-900 transition">
      Create account
    </button>
  </form>
  <p class="mt-4 text-center text-sm">
    Already have an account? <a href="{{ url_for('auth.login') }}" class="text-ielts-blue hover:underline">Log in</a>
  </p>
</div>
{% endblock %}
